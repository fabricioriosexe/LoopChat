spring.aot.enabled=false
spring.application.name=LoopChat
# Conexión a la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/loopchat_db
spring.datasource.username=root
spring.datasource.password=Fabri1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate DDL auto: actualiza la base de datos en función de las entidades
spring.jpa.hibernate.ddl-auto=update

# Dialecto de MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Mostrar SQL en la consola (opcional)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
